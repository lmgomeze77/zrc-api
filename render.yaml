services:
  - type: web
    name: zrc-api
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: RESEND_API_KEY
        sync: false
      - key: NOTIFY_EMAIL
        value: info@zenithrisecapital.com
      - key: FROM_EMAIL
        value: "ZRC Platform <noreply@zenithrisecapital.com>"
      - key: FRONTEND_URL
        value: https://zenithrisecapital.com
      - key: NODE_VERSION
        value: 20
